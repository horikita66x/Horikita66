<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HORIKITA BRAIN — отвечает как я</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: text;
        }
        body {
            background: #0b0b10;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ai-container {
            max-width: 700px;
            width: 100%;
            background: #111116;
            border: 2px solid #c0a050;
            border-radius: 36px;
            box-shadow: 0 0 20px rgba(192,160,80,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #c0a050;
        }
        .header h1 { font-size: 1.8rem; letter-spacing: 2px; color: #ffd966; }
        .header p { font-size: 0.7rem; color: #bcbcbc; }
        .chat-box { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 20px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; }
        .user { background: #2a2a35; align-self: flex-end; border: 1px solid #6f5bef; color: #f0f0f0; }
        .bot { background: #0f0f17; border: 1px solid #c0a050; align-self: flex-start; color: #ffecb3; white-space: pre-wrap; }
        .input-area { display: flex; gap: 8px; padding: 1rem; background: #060608; border-top: 1px solid #2a2a35; }
        input { flex: 1; background: #1e1e2a; border: 1px solid #c0a050; padding: 12px 16px; border-radius: 60px; color: white; font-family: monospace; font-size: 0.9rem; outline: none; }
        button { background: #c0a050; border: none; padding: 0 20px; border-radius: 60px; font-weight: bold; font-family: monospace; font-size: 1rem; color: #0b0b10; cursor: pointer; transition: 0.1s linear; }
        button:active { transform: scale(0.96); }
        .status { font-size: 0.7rem; text-align: center; padding: 6px; color: #ffb347; background: #00000088; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #c0a050; }
        @media (max-width: 550px) { .ai-container { height: 90vh; } .message { max-width: 95%; font-size: 0.85rem; } }
    </style>
</head>
<body>
<div class="ai-container">
    <div class="header">
        <h1>🧠 HORIKITA BRAIN</h1>
        <p>интеллект, который отвечает на всё (без API)</p>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">— Я HORIKITA BRAIN. Спрашивай что угодно — код, мемы, дизайн, жизнь, философию. Отвечаю как есть.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="спроси меня...">
        <button id="sendBtn">→</button>
    </div>
    <div class="status" id="statusText">🧠 активен | отвечаю на любой вопрос</div>
</div>

<script>
    (function(){
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        // Главный двигатель — эмуляция понимания + широкий спектр тем
        function think(question) {
            let q = question.toLowerCase();
            
            // === БЫСТРЫЕ ТОЧНЫЕ ОТВЕТЫ ===
            if (q.match(/привет|здарова|ку|hi|здравствуй|добрый день/)) return "— Здарова. Спрашивай, не стесняйся.";
            if (q.match(/как дела|как жизнь|как сам|чё нового/)) return "— Нормально. Вопросы интересные жду. А у тебя что нового?";
            if (q.match(/кто ты|ты кто|создатель/)) return "— Я HORIKITA BRAIN. Меня собрал @horikita666. Отвечаю как он сам — прямо, без понтов.";
            
            // === ПРОЕКТЫ И ССЫЛКИ ===
            if (q.match(/магазин|одежда|купить футболку|хочу заказать/)) 
                return "— Магазин HORIKITA66: https://horikita66x.github.io/Horikita/ . Выбирай вещи, пиши @horikita666 — сделаем заказ. Цены норм, качество жёсткое.";
            if (q.match(/игра|star strike|кликать звезды|бомбы/)) 
                return "— Игра «Star Strike»: https://horikita66x.github.io/starstrike/ . Правила: жми на звёзды (+10), бомбы не трогай (-15). Рекорд кидай @horikita666.";
            if (q.match(/визитка|первый сайт|геро|hero66/)) 
                return "— Первый сайт-визитка: https://horikita66x.github.io/Hero66/ . Космос, минимализм, ссылки.";
            if (q.match(/ai|brain|помощник|нейросеть/)) 
                return "— Ты сейчас общаешься с моей локальной версией. Без серверов, без API, но отвечаю почти на всё сам. Не туплю.";
            
            // === ТЕЛЕГРАМ, СВЯЗЬ ===
            if (q.match(/тг|телеграм|@horikita666|как связаться|написать автору/)) 
                return "— Пиши сюда: @horikita666 . По заказам, сотрудничеству, или просто поболтать.";
            
            // === ДИЗАЙН / ОФОРМЛЕНИЕ ===
            if (q.match(/дизайн|оформить канал|шапка|аватар|логотип|обложка/)) 
                return "— По дизайну — @horikita666. Может сделать шапку, аватар, оформить канал в твоём стиле. Недорого, по-пацански.";
            
            // === ПОМОЩЬ С КОДОМ ===
            if (q.match(/код|html|css|javascript|сверстать|сайт сделать|как написать/)) {
                if (q.match(/кнопку|форму|карточку товара|сетку/)) {
                    return "— Пример простой карточки товара: <div class='card'>...можешь попросить — накидаю код под твою задачу.";
                }
                return "— По коду помогаю. Напиши, что конкретно нужно: кнопку, сетку, анимацию или целый макет. Сделаем.";
            }
            
            // === МЕМЫ, ХАЙП, КУЛЬТУРА ===
            if (q.match(/мем|мемы|хайп|кринж|база|что такое хайп/)) 
                return "— Хайп — временный шум. Кринж — то, что не надо было постить. База — истина, которую выкупили свои. Мемы живут 2-3 дня, потом новый виток.";
            
            // === ЛЮБОВЬ, ОТНОШЕНИЯ (с юмором, но с уважением) ===
            if (q.match(/любовь|девушка|отношения|@karina_540z/)) 
                return "— Если это про @karina_540z — уважаю, бро. Вообще любовь штука сложная. Без фальши: либо есть движение, либо нет. Обсуждать лучше в Telegram, без лишних глаз.";
            
            // === ФИЛОСОФИЯ, ЖИЗНЬ, ПСИХОЛОГИЯ ===
            if (q.match(/смысл жизни|зачем мы|почему|как стать лучше|успех/)) 
                return "— Смысл жизни каждый тащит свой. Но пацанский рецепт: делай то, что не стыдно, держи слово, прокачивай скиллы. Успех не приходит к тем, кто ждёт.";
            
            // === БИЗНЕС, ЗАРАБОТОК ===
            if (q.match(/заработать|бизнес|деньги|подработка|фриланс/)) 
                return "— Самый простой путь: дизайн, вёрстка, модерация. Напиши @horikita666 — если темп норм, возьмёт на задачи. Или создавай свой продукт.";
            
            // === ТЕХНИЧЕСКИЕ ВОПРОСЫ (браузер, телефон, git) ===
            if (q.match(/git|github|pages|репозиторий/)) 
                return "— GitHub Pages: создаёшь репозиторий → заливаешь index.html → Settings → Pages → main → Save. Через минуту сайт жив.";
            if (q.match(/хостинг|бесплатный сайт|netlify/)) 
                return "— netlify.com/drop — самый простой способ: перетащил папку, получил ссылку. Но GitHub Pages надёжнее.";
            
            // === ЗДОРОВЬЕ, ТРЕНИРОВКИ ===
            if (q.match(/спорт|качалка|пресс|отжимания|бег/)) 
                return "— Без спорта никуда, бро. Минимум: отжимания, турник, приседы. Режим и дисциплина — больше чем генетика.";
            
            // === БЛОК ПРО ИГРУ (механика подробно) ===
            if (q.match(/как играть в star strike|правила игры|как кликать/)) 
                return "— Star Strike: тапай на звёзды — добавляется 10 очков. На бомбы нельзя — штраф 15 очков и тряска экрана. 30 секунд на раунд. Рекорд сохраняется.";
            
            // === БЛОК ПРО КОСМОС, СТИЛЬ ===
            if (q.match(/космос|звёзды|фон|анимация/)) 
                return "— Космос люблю. В первом сайте и игре — звёздные фоны. Если хочешь — могу подсказать, как сделать анимированный звёздный фон на чистом CSS.";
            
            // === НАУЧНЫЙ ИЛИ ИСТОРИЧЕСКИЙ ВОПРОС (обобщённо) ===
            if (q.match(/наука|история|физика|война|технологии/)) 
                return "— На тему науки и истории отвечу коротко: всегда проверяй факты. Если нужна конкретика — переформулируй вопрос жёстче, бро.";
            
            // === ЕСЛИ ВОПРОС ОЧЕНЬ КОРОТКИЙ ИЛИ НЕПОНЯТНЫЙ ===
            if (q.length < 5) return "— Конкретнее, бро. Не выкупаю твой намёк.";
            
            // === УМНАЯ ИМПРОВИЗАЦИЯ (для всего остального) ===
            const smartResponses = [
                "— Я тебя услышал. По этому вопросу могу сказать так: смотри на ситуацию прямо, без иллюзий. Действуй по шагам. Если нужен конкретный совет — разверни вопрос.",
                "— Тема глубокая. Если коротко: всё зависит от контекста. Лучше обсудить в Telegram — @horikita666. Там смогу развернуться.",
                "— Хороший вопрос. Но без нюансов не обойтись. Напиши @horikita666 — разжуём. А так, в общем: доверяй логике и своей базе.",
                "— Понимаю, о чём ты. Главное — не быть фейком. Действуй последовательно. Остальное можно обсудить детальнее.",
                "— Слишком обширная тема, чтобы ответить в двух строках. Если нужно реальное решение — уточни, бро."
            ];
            return smartResponses[Math.floor(Math.random() * smartResponses.length)];
        }
        
        function onSend() {
            const question = userInput.value.trim();
            if(!question) return;
            addMessage(question, true);
            userInput.value = '';
            setTimeout(() => {
                const answer = think(question);
                addMessage(answer, false);
            }, 80);
        }
        
        sendBtn.addEventListener('click', onSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') onSend(); });
    })();
</script>
</body>
</html>
