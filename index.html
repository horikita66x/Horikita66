<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HORIKITA AI — брутальный ассистент</title>
    <!-- Подключаем предобученную модель (маленькая, ~300МБ, загружается один раз) -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0/dist/transformers.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: text;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b0b10;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .ai-container {
            max-width: 700px;
            width: 100%;
            background: #111116;
            border: 2px solid #c0a050;
            border-radius: 36px;
            box-shadow: 0 0 20px rgba(192,160,80,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }
        .header {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #c0a050;
        }
        .header h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: #ffd966;
            text-shadow: 0 0 4px #b87c00;
        }
        .header p {
            font-size: 0.7rem;
            color: #bcbcbc;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #2a2a35;
            align-self: flex-end;
            border: 1px solid #6f5bef;
            color: #f0f0f0;
        }
        .bot {
            background: #0f0f17;
            border: 1px solid #c0a050;
            align-self: flex-start;
            color: #ffecb3;
        }
        .loading {
            background: #1f1f2a;
            font-style: italic;
            color: #aaa;
        }
        .input-area {
            display: flex;
            gap: 8px;
            padding: 1rem;
            background: #060608;
            border-top: 1px solid #2a2a35;
        }
        input {
            flex: 1;
            background: #1e1e2a;
            border: 1px solid #c0a050;
            padding: 12px 16px;
            border-radius: 60px;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
        }
        button {
            background: #c0a050;
            border: none;
            padding: 0 20px;
            border-radius: 60px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            color: #0b0b10;
            cursor: pointer;
            transition: 0.1s linear;
        }
        button:active {
            transform: scale(0.96);
        }
        .status {
            font-size: 0.7rem;
            text-align: center;
            padding: 6px;
            color: #ffb347;
            background: #00000088;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #c0a050; }
        @media (max-width: 550px) {
            .ai-container { height: 90vh; }
            .message { max-width: 95%; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="ai-container">
    <div class="header">
        <h1>⚡ HORIKITA AI ⚡</h1>
        <p>брутальный интеллект — отвечает на всё | работает локально</p>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">— Че надо? Я HORIKITA AI. Спрашивай про мемы, код, игру, дизайн или просто жизнь. Без цензуры.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="спроси меня, бро...">
        <button id="sendBtn">→</button>
    </div>
    <div class="status" id="statusText">⚡ модель загружается (первые секунды)</div>
</div>

<script>
    (function(){
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusSpan = document.getElementById('statusText');
        
        let model = null;
        let tokenizer = null;
        let isReady = false;
        
        // быстрое логгирование в статус
        function setStatus(msg, isError = false) {
            statusSpan.innerHTML = msg;
            if(isError) statusSpan.style.color = '#ff7777';
            else statusSpan.style.color = '#ffb347';
        }
        
        // добавляем сообщение в чат
        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        // временная "печатает"
        let loadingDiv = null;
        function showTyping() {
            if(loadingDiv) loadingDiv.remove();
            loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot loading';
            loadingDiv.innerText = '— думаю...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function hideTyping() {
            if(loadingDiv) { loadingDiv.remove(); loadingDiv = null; }
        }
        
        // ГЕНЕРАЦИЯ ОТВЕТА ЧЕРЕЗ transformers.js (нейросеть)
        async function generateAnswer(prompt) {
            if(!isReady || !model || !tokenizer) {
                return "Модель ещё не загрузилась, чувак. Подожди пару секунд и напиши снова.";
            }
            try {
                // используем маленькую, но шуструю модель для диалогов (microsoft/DialoGPT-small)
                // можно задать параметры генерации
                const inputs = await tokenizer(prompt, { return_tensors: 'pt', padding: true, truncation: true });
                const outputs = await model.generate({
                    input_ids: inputs.input_ids,
                    attention_mask: inputs.attention_mask,
                    max_new_tokens: 100,
                    do_sample: true,
                    temperature: 0.85,
                    top_p: 0.9,
                    repetition_penalty: 1.2
                });
                const decoded = await tokenizer.decode(outputs[0], { skip_special_tokens: true });
                let answer = decoded.trim();
                if(!answer) answer = "Не выкупил вопрос. Перефразируй по-братски.";
                // убираем повтор промпта (модель иногда возвращает prompt+answer)
                if(answer.toLowerCase().startsWith(prompt.toLowerCase())) {
                    answer = answer.slice(prompt.length).trim();
                }
                if(answer === "") answer = "Красава, вопрос годный. Но я пока не придумал ответ — попробуй ещё.";
                return answer;
            } catch(e) {
                console.error(e);
                return "Ошибка в нейросети (сбой генерации). Напиши проще или перезагрузи страницу.";
            }
        }
        
        // инициализация модели - диалоговая на 125M параметров (работает на телефоне ~200-300МБ ОЗУ)
        async function initModel() {
            setStatus("🔄 Загрузка брутального мозга... (первые 20-40 секунд)");
            try {
                const { pipeline, env } = transformers;
                env.localModelPath = 'https://huggingface.co/microsoft/DialoGPT-small/resolve/main/';
                // используем текстовую генерацию
                const generator = await pipeline('text-generation', 'microsoft/DialoGPT-small', {
                    quantized: true,
                    progress_callback: (progress) => {
                        if(progress.status === 'downloading') {
                            setStatus(`📡 грузим модель: ${Math.round(progress.progress*100)}%`);
                        }
                    }
                });
                model = generator.model;
                tokenizer = generator.tokenizer;
                isReady = true;
                setStatus("✅ HORIKITA AI готов. Спрашивай чёрт возьми!");
                addMessage("— Я в деле. Задавай любой вопрос, бро.", false);
            } catch(err) {
                console.error(err);
                setStatus("❌ Ошибка загрузки модели. Проверь интернет и перезагрузи страницу.", true);
                addMessage("— Не смог загрузить нейросеть. Может, файрвол? Попробуй обновить страницу или попозже.", false);
            }
        }
        
        // обработка отправки сообщения
        async function onSend() {
            const question = userInput.value.trim();
            if(!question) return;
            if(!isReady) {
                addMessage("Погоди, мозг ещё грузится. Через пару секунд отвечу.", false);
                return;
            }
            addMessage(question, true);
            userInput.value = '';
            showTyping();
            const reply = await generateAnswer(question);
            hideTyping();
            addMessage(reply, false);
        }
        
        sendBtn.addEventListener('click', onSend);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') onSend(); });
        
        // напутствие и запуск
        setTimeout(() => {
            initModel();
        }, 100);
        
        // fallback если модель не загрузилась через 20 секунд (показать помощь)
        setTimeout(() => {
            if(!isReady) {
                addMessage("— Что-то долго, брат. Проверь соединение. Если интернет есть — обнови страницу.", false);
            }
        }, 25000);
    })();
</script>
</body>
</html>
