<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STAR STRIKE — HORIKITA66</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #03030f;
            background-image: radial-gradient(circle at 20% 30%, #0a0a1a 2%, #000000 90%);
            font-family: 'Courier New', 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* главный контейнер */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            height: 95vh;
            max-height: 800px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 48px;
            border: 2px solid #ffd966;
            box-shadow: 0 0 20px rgba(255, 200, 50, 0.3);
            overflow: hidden;
            margin: 0 auto;
        }

        /* панель статистики */
        .stats {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            background: #000000aa;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #ffd966;
            z-index: 20;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 2px;
            box-sizing: border-box;
        }

        .score-box, .timer-box, .best-box {
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #ffb347;
        }

        .best-box span {
            color: #ffb347;
        }

        /* поле для падения объектов */
        .play-area {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* падающие штуки */
        .fall-item {
            position: absolute;
            font-size: 42px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 0 4px currentColor);
            transition: transform 0.02s linear;
            pointer-events: auto;
            z-index: 15;
        }

        .fall-item:active {
            transform: scale(0.85);
        }

        /* конец игры */
        .end-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000cc;
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            border-radius: 48px;
        }

        .end-panel h2 {
            font-size: 2.8rem;
            color: #ffd966;
            text-shadow: 0 0 6px red;
            margin: 0;
        }

        .final-score {
            font-size: 2rem;
            background: #111;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid gold;
        }

        .restart-btn {
            background: #ffd966;
            border: none;
            padding: 12px 28px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 60px;
            font-family: monospace;
            cursor: pointer;
            box-shadow: 0 0 8px orange;
            transition: 0.1s linear;
        }

        .restart-btn:active {
            transform: scale(0.96);
        }

        .tg-link {
            background: #1e2a3a;
            color: #ffd966;
            padding: 10px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 8px;
            border: 1px solid #ffb347;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 550px) {
            .fall-item {
                font-size: 48px;
                width: 65px;
                height: 65px;
            }
            .stats {
                font-size: 1rem;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="stats">
        <div class="score-box">⭐ SCORE: <span id="scoreValue">0</span></div>
        <div class="timer-box">⏱️ <span id="timerValue">30</span>s</div>
        <div class="best-box">🏆 BEST: <span id="bestValue">0</span></div>
    </div>

    <div class="play-area" id="playArea"></div>

    <div class="end-panel hidden" id="endPanel">
        <h2>💥 ВЗОРВАНО!</h2>
        <div class="final-score">ТВОЙ СЧЁТ: <span id="finalScoreSpan">0</span></div>
        <div>⭐ звёзды +10 &nbsp;&nbsp; 💣 бомбы -15</div>
        <button class="restart-btn" id="restartBtn">⚡ НОВАЯ ИГРА ⚡</button>
        <a href="https://t.me/horikita666" target="_blank" class="tg-link">📨 КИНЬ РЕКОРД @HORIKITA666</a>
    </div>
</div>

<script>
    (function() {
        // -------------------- ИГРОВЫЕ ПЕРЕМЕННЫЕ --------------------
        let score = 0;
        let timeLeft = 30;          // секунд
        let gameActive = true;
        let animationFrameId = null;
        let spawnInterval = null;
        let timerInterval = null;
        
        let bestScore = localStorage.getItem("starStrikeBest") ? parseInt(localStorage.getItem("starStrikeBest")) : 0;
        document.getElementById("bestValue").innerText = bestScore;
        
        const playArea = document.getElementById("playArea");
        const scoreSpan = document.getElementById("scoreValue");
        const timerSpan = document.getElementById("timerValue");
        const endPanel = document.getElementById("endPanel");
        const finalScoreSpan = document.getElementById("finalScoreSpan");
        
        // массив активных объектов: { element, type, y, speed }
        let activeItems = [];
        
        // ---------- ЗВУКИ через Web Audio (без файлов) ----------
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playStarSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = "sine";
                osc.frequency.value = 880;
                gain.gain.value = 0.12;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
                osc.stop(now + 0.3);
            } catch(e) { console.log("audio err"); }
        }
        
        function playBombSound() {
            if (!audioCtx) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = "sawtooth";
                osc.frequency.value = 140;
                gain.gain.value = 0.1;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
                osc.stop(now + 0.35);
            } catch(e) { console.log("audio err"); }
        }
        
        // разблокировка звука (первый тап по полю)
        function unlockAudioOnFirstTap() {
            if (audioCtx && audioCtx.state === "suspended") {
                audioCtx.resume();
            }
            playArea.removeEventListener("touchstart", unlockAudioOnFirstTap);
            playArea.removeEventListener("mousedown", unlockAudioOnFirstTap);
        }
        playArea.addEventListener("touchstart", unlockAudioOnFirstTap);
        playArea.addEventListener("mousedown", unlockAudioOnFirstTap);
        
        // ---------- ИГРОВАЯ ЛОГИКА ----------
        function updateUI() {
            scoreSpan.innerText = score;
            timerSpan.innerText = timeLeft;
        }
        
        function addScore(points) {
            if (!gameActive) return;
            score += points;
            if (score < 0) score = 0;
            updateUI();
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem("starStrikeBest", bestScore);
                document.getElementById("bestValue").innerText = bestScore;
            }
        }
        
        // создать падающий элемент
        function spawnItem() {
            if (!gameActive) return;
            const isStar = Math.random() < 0.6; // 60% звезды, 40% бомбы
            const type = isStar ? "star" : "bomb";
            const emoji = type === "star" ? "⭐" : "💣";
            
            const element = document.createElement("div");
            element.className = "fall-item";
            element.innerText = emoji;
            if (type === "star") {
                element.style.color = "#FFD966";
                element.style.textShadow = "0 0 6px gold";
            } else {
                element.style.color = "#FF5A5F";
                element.style.textShadow = "0 0 6px darkred";
            }
            
            const areaRect = playArea.getBoundingClientRect();
            const maxLeft = Math.max(10, areaRect.width - 70);
            const leftPos = 10 + Math.random() * (maxLeft - 20);
            element.style.left = leftPos + "px";
            element.style.top = "0px";
            
            playArea.appendChild(element);
            
            const speed = 1.5 + Math.random() * 2.2;   // пикселей за кадр (60fps)
            activeItems.push({
                element: element,
                type: type,
                y: 0,
                speed: speed,
                left: leftPos
            });
            
            // обработчик клика именно на этом элементе
            const clickHandler = (e) => {
                e.stopPropagation();
                if (!gameActive) return;
                if (!audioCtx) initAudio();
                if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
                
                const idx = activeItems.findIndex(i => i.element === element);
                if (idx !== -1) {
                    const item = activeItems[idx];
                    if (item.type === "star") {
                        addScore(10);
                        playStarSound();
                    } else {
                        addScore(-15);
                        playBombSound();
                    }
                    // удаляем элемент
                    item.element.remove();
                    activeItems.splice(idx, 1);
                }
                e.preventDefault();
            };
            element.addEventListener("click", clickHandler);
            element.addEventListener("touchstart", clickHandler, { passive: false });
        }
        
        // анимация падения (requestAnimationFrame)
        let lastTimestamp = 0;
        function animateFall(now) {
            if (!gameActive) return;
            const areaHeight = playArea.clientHeight;
            for (let i = activeItems.length-1; i >= 0; i--) {
                const item = activeItems[i];
                if (!item.element) {
                    activeItems.splice(i,1);
                    continue;
                }
                item.y += item.speed;
                if (item.y > areaHeight - 70) {
                    // упал за пределы поля — просто удаляем без штрафа
                    item.element.remove();
                    activeItems.splice(i,1);
                } else {
                    item.element.style.top = item.y + "px";
                }
            }
            animationFrameId = requestAnimationFrame(animateFall);
        }
        
        // запуск спавна
        function startSpawning() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if (gameActive) spawnItem();
            }, 700);  // каждые 0.7 сек новый объект
        }
        
        // таймер обратного отсчёта
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (timeLeft <= 1) {
                    // конец игры
                    clearInterval(timerInterval);
                    clearInterval(spawnInterval);
                    gameActive = false;
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                    // удаляем все активные элементы
                    for (let item of activeItems) {
                        if (item.element) item.element.remove();
                    }
                    activeItems = [];
                    endGame();
                } else {
                    timeLeft--;
                    timerSpan.innerText = timeLeft;
                }
            }, 1000);
        }
        
        function endGame() {
            gameActive = false;
            finalScoreSpan.innerText = score;
            endPanel.classList.remove("hidden");
            // показываем финальный счёт
        }
        
        function restartGame() {
            // чистим всё
            if (spawnInterval) clearInterval(spawnInterval);
            if (timerInterval) clearInterval(timerInterval);
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            for (let item of activeItems) {
                if (item.element) item.element.remove();
            }
            activeItems = [];
            gameActive = true;
            score = 0;
            timeLeft = 30;
            updateUI();
            endPanel.classList.add("hidden");
            
            // перезапускаем механику
            startSpawning();
            startTimer();
            animationFrameId = requestAnimationFrame(animateFall);
        }
        
        // инициализация нового раунда (без глюков)
        function initGame() {
            restartGame(); // проще перезапустить
        }
        
        // разовая инициализация при запуске страницы
        function setup() {
            initAudio();
            // фикс для анимации размера поля
            window.addEventListener("resize", () => {});
            initGame();
        }
        
        // кнопка рестарта
        document.getElementById("restartBtn").addEventListener("click", (e) => {
            restartGame();
        });
        
        setup();
    })();
</script>
</body>
    </html>
